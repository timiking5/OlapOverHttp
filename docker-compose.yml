services:
  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP API
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    mem_limit: 4g
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: posting
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  migrator:
    image: ghcr.io/kukymbr/goose-docker:3.27.0
    container_name: clickhouse-migrator
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: clickhouse
      GOOSE_DBSTRING: tcp://clickhouse:clickhouse@clickhouse:9000/posting
      GOOSE_COMMAND: up
      GOOSE_VERBOSE: "true"
    volumes:
      - ./OlapOverHttp.Schema/ClickHouseMigrations:/migrations

  postgres:
    image: postgres:18-alpine
    container_name: postgres-server
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posting
    volumes:
      - postgres-data:/var/lib/postgresql
    mem_limit: 3g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posting"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres-migrator:
    image: ghcr.io/kukymbr/goose-docker:3.27.0
    container_name: postgres-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: host=postgres port=5432 user=postgres password=postgres dbname=posting sslmode=disable
      GOOSE_COMMAND: up
      GOOSE_VERBOSE: "true"
    volumes:
      - ./OlapOverHttp.Schema/PostgresMigrations:/migrations

  pgweb:
    image: sosedoff/pgweb
    container_name: pgweb-ui
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/posting?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  tabix:
    image: spoonest/clickhouse-tabix-web-client
    container_name: tabix-ui
    ports:
      - "8080:80"

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API (host 9000 is used by ClickHouse)
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  clickhouse-data:
  postgres-data:
  minio-data: